%% openAut EMQX authorization (file source). Deny-by-default.
%% ${clientid} resolves to the client cert CN = the edge node id.

%% Edge nodes may publish ONLY under their own node prefix.
{allow, all, publish, ["openaut/+/${clientid}/#"]}.

%% Edge nodes set their own Last-Will / status.
{allow, all, publish, ["openaut/+/${clientid}/$status"]}.

%% The TimescaleDB ingest consumer (and read-only agents) subscribe to all telemetry.
{allow, {user, "ingest"}, subscribe, ["openaut/#"]}.
{allow, {user, "agent_ro"}, subscribe, ["openaut/#"]}.

%% Nothing else.
{deny, all}.
