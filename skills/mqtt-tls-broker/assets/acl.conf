%% openAut EMQX authorization (file source). Deny-by-default.
%% ${cert_common_name} = the client certificate's whole CN, read at the TLS layer
%% (verify_peer + fail_if_no_peer_cert on the mutual-TLS listener) -- never the
%% client-supplied MQTT ClientID (which ${clientid} would be; a client can set that
%% to anything, cert or not -- see ADR 0004 decision 1's legacy-limitation note and
%% docs/verification/emqx-mqtt5-cmd-verification.md, verified live against EMQX 5.8.9 CE).
%% CN is the combined "<site>/<node>" identifier -- Community Edition has no built-in
%% per-SAN-field extraction, so both segments are validated and joined at cert-issuance
%% time (skills/mqtt-tls-broker/scripts/gen-certs.sh) before the cert is ever signed.
%% This ACL trusts that precondition; it does not re-validate it -- an unvalidated CN
%% substituted here is a live wildcard-injection risk (proven exploitable, see the
%% verification doc's Test 2), not a theoretical one.

%% Edge nodes may publish ONLY under their own site/node prefix.
{allow, all, publish, ["openaut/${cert_common_name}/#"]}.

%% Edge nodes set their own Last-Will / status.
{allow, all, publish, ["openaut/${cert_common_name}/$status"]}.

%% The TimescaleDB ingest consumer (and read-only agents) subscribe to all telemetry.
{allow, {user, "ingest"}, subscribe, ["openaut/#"]}.
{allow, {user, "agent_ro"}, subscribe, ["openaut/#"]}.

%% Nothing else.
{deny, all}.
